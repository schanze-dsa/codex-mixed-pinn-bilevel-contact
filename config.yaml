normal_config:
  mode: "alm"
  beta: 50.0          # 娉曞悜鎺ヨЕ鎯╃綒 (淇濇寔榛樿)
  mu_n: 1.0e3         # 娉曞悜ALM绯绘暟
  residual_mode: fb
  fb_eps: 1.0e-8

# ------------------------------------------------------------
# 8. 杈撳嚭涓庡彲瑙嗗寲
# ------------------------------------------------------------
output_config:
  save_path: './results'
  visualize: true
  viz_use_last_training_case: true
  viz_samples_after_train: 1
  viz_eval_scope: surface
  viz_force_pointwise: true
  viz_plot_stages: true

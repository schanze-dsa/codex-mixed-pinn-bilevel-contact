# ============================================================
# DFEM + PINN 鎬婚厤缃?
# - 鏈増锛氫笁绉嶆潗鏂?jingmian / structural_steel / zhijia
# - 寮规€т富妯″瀷锛氱嚎寮规€?+ 棰勭揣 + 鎺ヨЕ/鎽╂摝
# - 棰濆淇濆瓨浜嗗眻鏈嶅己搴︺€佸瘑搴︺€佺儹瀵肩巼绛夛紝渚夸簬鍚庡鐞?
# ============================================================

# ------------------------------------------------------------
# 1. 鏉愭枡搴?
